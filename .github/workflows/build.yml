name: Build JAR

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Default: read-only. Release jobs elevate permissions only when needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: .github/build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build library and demo JARs
        run: ./gradlew clean jar fatJar --no-daemon

      - name: List built JARs
        run: ls -lah build/libs/

      - name: Upload JAR artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: algocodehub-jars
          path: .github/build/build/libs/
          if-no-files-found: error
          retention-days: 30

  publish-latest:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download JAR artifacts
        uses: actions/download-artifact@v8
        with:
          name: algocodehub-jars
          path: jars

      - name: Publish to Releases (Latest JAR Build)
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: latest-jars
          name: Latest JAR Build
          body: |
            Auto-built JARs from commit ${{ github.sha }}.

            | File | Use |
            |------|-----|
            | `algocodehub-1.0.0-lib.jar` | Library — add to classpath |
            | `algocodehub-1.0.0-demo.jar` | Runnable — `java -jar ...demo.jar` |

            For a versioned release, push tag `v1.0.0`.
          artifacts: jars/algocodehub-*.jar
          allowUpdates: true
          removeArtifacts: true
          makeLatest: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-version:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download JAR artifacts
        uses: actions/download-artifact@v8
        with:
          name: algocodehub-jars
          path: jars

      - name: Attach JARs to versioned Release
        uses: softprops/action-gh-release@v3
        with:
          files: jars/algocodehub-*.jar
          generate_release_notes: true
